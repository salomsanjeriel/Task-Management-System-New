services:
  - type: web
    name: task-management-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
